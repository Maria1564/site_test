<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red button</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nata+Sans:wght@100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <nav class="header__nav">
          <div class="header__logo">
            <img src="img/logo.svg" alt="logo" />
          </div>
          <button class="header__btn">Связаться с нами</button>
          <div class="header__nav-list">
            <div class="header__nav-item">кейсы</div>
            <div class="header__nav-item">услуги</div>
            <div class="header__nav-item">блог</div>
            <div class="header__nav-item">о нас</div>
            <div class="header__nav-item">школа дизайна</div>
            <div class="header__nav-item">контакты</div>
          </div>
        </nav>

        <div class="header__arrows">
          <img src="img/arrows.png" alt="arrows" />
        </div>

        <div class="header__content">
          <h1 class="header__title">Сделаем современный сайт за две недели</h1>
          <p class="header__text">
            Разрабатываем и поддерживаем сайты, внедряем CRM и телефонию,
            поддерживаем уже готовые проекты
          </p>
        </div>
      </div>
    </header>
  </body>
</html>
